name: Martos rytinė apžvalga

on:
  schedule:
    # GitHub cron is UTC. 05:00 UTC is ~07:00 Vilnius (winter, UTC+2) /
    # ~08:00 Vilnius (summer, UTC+3). GitHub's scheduler is best-effort and
    # may be delayed by hours, but there is no longer a gate: whenever this
    # fires, the page is regenerated and published. One invocation per day.
    - cron: "0 5 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: morning-news
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "anthropic>=0.40"

      - name: Generate today's page
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit and push
        run: |
          git config user.name "Morning News Bot"
          git config user.email "news@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to index.html — nothing to publish."
          else
            git commit -m "Naujienos $(TZ='Europe/Vilnius' date +%Y-%m-%d)"
            git push
          fi
