name: Martos rytinė apžvalga

on:
  schedule:
    # GitHub cron is UTC. Target publish time is 05:00 Vilnius, which is
    # 02:00 UTC (summer, UTC+3) or 03:00 UTC (winter, UTC+2).
    # GitHub's scheduler is best-effort and is regularly delayed by hours,
    # so a strict "run only at exactly HH:00" guard would skip every day.
    # Instead we trigger early/often and let the guard publish at most once
    # per Vilnius day, on or after 05:00 local — whenever the runner fires.
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: morning-news
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide whether to publish (>=05:00 Vilnius, once per day)
        id: gate
        run: |
          export TZ="Europe/Vilnius"
          HOUR=$((10#$(date +%H)))
          TODAY=$(date +%F)
          LAST=$(git log -1 --format=%cd --date=format-local:%F -- index.html || echo "")
          echo "Vilnius now: $(date '+%F %H:%M')  |  index.html last published: ${LAST:-never}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run — publishing."
            echo "go=true" >> "$GITHUB_OUTPUT"
          elif [ "$TODAY" = "$LAST" ]; then
            echo "Already published today ($TODAY) — skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -ge 5 ]; then
            echo "Not yet published today and it is >=05:00 Vilnius — publishing."
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "Before 05:00 Vilnius — skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.go == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.gate.outputs.go == 'true'
        run: pip install "anthropic>=0.40"

      - name: Generate today's page
        if: steps.gate.outputs.go == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit and push
        if: steps.gate.outputs.go == 'true'
        run: |
          git config user.name "Morning News Bot"
          git config user.email "news@users.noreply.github.com"
          if git diff --quiet -- index.html; then
            echo "No changes to index.html."
          else
            git add index.html
            git commit -m "Naujienos $(TZ='Europe/Vilnius' date +%Y-%m-%d)"
            git push
          fi
