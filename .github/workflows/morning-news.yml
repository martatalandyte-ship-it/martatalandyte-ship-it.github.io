name: Martos rytinė apžvalga

on:
  schedule:
    # GitHub's cron is UTC and best-effort (often delayed by tens of minutes).
    # To make sure the edition is ready before morning in Vilnius (UTC+3 in
    # summer), we trigger several times in the early hours. The job is
    # idempotent — index.html carries an <!-- edition:YYYY-MM-DD --> marker, so
    # only the first run each day actually generates; later triggers skip.
    # 01:00–05:00 UTC ≈ 04:00–08:00 Vilnius (summer) / 03:00–07:00 (winter).
    - cron: "0 1 * * *"
    - cron: "0 2 * * *"
    - cron: "0 3 * * *"
    - cron: "0 4 * * *"
    - cron: "0 5 * * *"
  workflow_dispatch: {}   # manual "Run workflow" from the Actions tab

permissions:
  contents: write

concurrency:
  group: morning-news
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if today's edition already published
        id: gate
        run: |
          TODAY=$(TZ="Europe/Vilnius" date +%F)
          if [ -f index.html ] && grep -q "edition:$TODAY" index.html; then
            echo "Edition for $TODAY already published — skipping."
            echo "go=false" >> "$GITHUB_OUTPUT"
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.go == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.gate.outputs.go == 'true'
        run: pip install "anthropic>=0.40"

      - name: Generate today's page
        if: steps.gate.outputs.go == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_news.py

      - name: Commit and push
        if: steps.gate.outputs.go == 'true'
        run: |
          git config user.name "Morning News Bot"
          git config user.email "news@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to index.html — nothing to publish."
          else
            git commit -m "Naujienos $(TZ='Europe/Vilnius' date +%Y-%m-%d)"
            git push
          fi
